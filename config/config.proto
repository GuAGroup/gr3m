// license that can be found in the LICENSE file.

message Config {
  string config_name = 1;
  repeated string server_ips = 2;
  repeated int32 ports = 3;
  repeated string dns_servers = 4;
  
  bytes public_key = 5; 
  
  repeated Peer peers = 6;
  ProtocolSettings protocol = 7;
  bool hysteria = 8;
}

message Peer {
  string id = 1;
  string address = 2;
  int32 port = 3;
  bytes public_key = 4;
}

message ProtocolSettings {
  string version = 1;
  int32 timeout_seconds = 2;
  bool use_tls = 3;
}